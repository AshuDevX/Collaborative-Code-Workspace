version: '3.9'

services:
  # Main app (server + client build)
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/codecollab
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CLIENT_URL=http://localhost:3001
    depends_on:
      - mongo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker-in-Docker execution
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017"

volumes:
  mongo_data:
